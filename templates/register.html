{% extends "base.html" %}
{% block title %}Cont nou - EvoCore{% endblock %}

{% block content %}
<div class="form-wrap">
    <h1>Creeaza un cont</h1>
    <p class="sub">Inregistreaza-te ca sa poti comanda pe EvoCore.</p>
    <form method="post">
        <div class="field">
            <label for="name">Nume complet</label>
            <input id="name" type="text" name="name" value="{{ name|default('') }}" required>
        </div>
        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" value="{{ email|default('') }}" required>
        </div>
        <div class="field">
            <label for="password">Parola (min. 6 caractere)</label>
            <input id="password" type="password" name="password" required>
        </div>
        <div class="field">
            <label for="confirm">Confirma parola</label>
            <input id="confirm" type="password" name="confirm" required>
        </div>
        <button class="btn btn-block" type="submit">Creeaza cont</button>
    </form>
    <p class="form-foot">Ai deja cont?
        <a href="{{ url_for('login') }}">Autentifica-te</a>.
    </p>
</div>
{% endblock %}
