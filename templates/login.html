{% extends "base.html" %}
{% block title %}Autentificare - EvoCore{% endblock %}

{% block content %}
<div class="form-wrap">
    <h1>Autentificare</h1>
    <p class="sub">Intra in contul tau EvoCore.</p>
    <form method="post">
        <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" value="{{ email|default('') }}" required>
        </div>
        <div class="field">
            <label for="password">Parola</label>
            <input id="password" type="password" name="password" required>
        </div>
        <button class="btn btn-block" type="submit">Autentificare</button>
    </form>
    <p class="form-foot">Nu ai cont?
        <a href="{{ url_for('register') }}">Creeaza unul aici</a>.
    </p>
</div>
{% endblock %}
